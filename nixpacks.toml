# Nixpacks build config for Railway.
# WeasyPrint kraever cairo, pango, fontconfig, harfbuzz, gdk-pixbuf, libffi paa system-niveau.
# Disse er ikke i Nixpacks default Python-image, saa vi tilfoejer dem her.

[phases.setup]
nixPkgs = [
    "python312",
    "gcc",
    "pango",
    "cairo",
    "harfbuzz",
    "gdk-pixbuf",
    "fontconfig",
    "libffi",
]
